<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VERBO IA - Gerador CPID</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, .92);
      --panel2: rgba(30, 41, 59, .88);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --gold: #d6a84f;
      --gold2: #f8dc8c;
      --line: rgba(255,255,255,.13);
      --danger: #ef4444;
      --success: #22c55e;
      --paper: #ffffff;
      --ink: #111827;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.28), transparent 30%),
        radial-gradient(circle at top right, rgba(214,168,79,.16), transparent 28%),
        linear-gradient(135deg, #020617 0%, #0f172a 50%, #111827 100%);
      color: var(--text);
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 22px;
    }

    .topbar {
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(214,168,79,.16), rgba(15,23,42,.9));
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: 0 22px 55px rgba(0,0,0,.28);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-area h1 {
      margin: 0;
      color: var(--gold2);
      letter-spacing: 3px;
      font-size: 38px;
      font-weight: 900;
    }

    .brand-area p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 430px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel,
    .preview-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 22px 55px rgba(0,0,0,.28);
    }

    .panel {
      padding: 18px;
    }

    .panel h2,
    .preview-title h2 {
      margin: 0;
      color: var(--gold2);
      font-size: 21px;
    }

    .form-section {
      margin-top: 16px;
    }

    label {
      display: block;
      margin: 13px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(2,6,23,.55);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 13px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 170px;
      line-height: 1.45;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(214,168,79,.14);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-area {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 16px;
      padding: 13px 14px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      transition: .15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: .55;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #d6a84f, #f8dc8c);
      color: #111827;
    }

    .btn-secondary {
      background: rgba(255,255,255,.10);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.14);
    }

    .btn-edit {
      background: rgba(34,197,94,.14);
      color: #bbf7d0;
      border: 1px solid rgba(34,197,94,.35);
    }

    .btn-danger {
      background: rgba(239,68,68,.14);
      color: #fecaca;
      border: 1px solid rgba(239,68,68,.35);
    }

    .status-box {
      margin-top: 14px;
      padding: 13px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      display: none;
    }

    .status-box.show {
      display: block;
    }

    .status-main {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      margin: 0;
    }

    .status-ok {
      border-color: rgba(34,197,94,.45);
    }

    .status-error {
      border-color: rgba(239,68,68,.45);
    }

    .progress-list {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 7px;
    }

    .progress-list li {
      color: #cbd5e1;
      font-size: 13px;
      background: rgba(2,6,23,.42);
      border: 1px solid rgba(255,255,255,.08);
      padding: 8px 10px;
      border-radius: 12px;
      line-height: 1.35;
    }

    .progress-list li.done {
      color: #bbf7d0;
      border-color: rgba(34,197,94,.30);
    }

    .progress-list li.error {
      color: #fecaca;
      border-color: rgba(239,68,68,.35);
    }

    .preview-panel {
      overflow: hidden;
      padding: 15px;
    }

    .preview-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .preview-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .document-shell {
      background: #e5e7eb;
      border-radius: 18px;
      overflow: auto;
      max-height: 82vh;
      border: 1px solid rgba(255,255,255,.12);
    }

    #printArea {
      width: 794px;
      margin: 0 auto;
      background: #ffffff;
      color: var(--ink);
      min-height: 1120px;
      transform-origin: top center;
    }

    #printArea.editing {
      outline: 4px solid rgba(34,197,94,.45);
    }

    .empty {
      min-height: 620px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      color: #64748b;
      text-align: center;
      background: #ffffff;
    }

    .page {
      width: 794px;
      min-height: 1122px;
      padding: 58px;
      background: #ffffff;
      color: #111827;
      page-break-after: always;
      position: relative;
      overflow: hidden;
    }

    .page:last-child {
      page-break-after: auto;
    }

    .content-page h1 {
      margin: 0 0 16px;
      font-size: 34px;
      line-height: 1.15;
      color: #111827;
    }

    .content-page h2 {
      margin: 30px 0 10px;
      padding-bottom: 7px;
      font-size: 25px;
      color: #7c4a03;
      border-bottom: 2px solid #f0d38a;
    }

    .content-page h3 {
      margin: 24px 0 8px;
      font-size: 20px;
      color: #92400e;
    }

    .content-page h4 {
      margin: 18px 0 6px;
      font-size: 17px;
      color: #1f2937;
    }

    .content-page p {
      margin: 0 0 12px;
      font-size: 15.5px;
      line-height: 1.72;
      text-align: justify;
    }

    .badge {
      display: inline-block;
      padding: 7px 12px;
      border-radius: 999px;
      background: #fff3c4;
      color: #7c4a03;
      font-weight: 900;
      font-size: 12px;
      margin-bottom: 14px;
    }

    .quote {
      margin: 18px 0;
      padding: 14px 16px;
      border-left: 5px solid #d6a84f;
      background: #fef3c7;
      border-radius: 12px;
      color: #78350f;
      font-weight: 700;
      font-style: italic;
    }

    .box {
      margin: 18px 0;
      padding: 16px;
      border: 1px solid #edd28a;
      background: #fffbeb;
      border-radius: 14px;
    }

    .box h3 {
      margin-top: 0;
    }

    .objectives {
      margin: 18px 0;
      padding: 16px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
    }

    .objectives ul,
    .box ul {
      margin: 8px 0 0;
      padding-left: 22px;
    }

    .objectives li,
    .box li {
      margin: 7px 0;
      line-height: 1.5;
    }

    .review {
      margin: 18px 0;
      padding: 16px;
      background: #f1f5f9;
      border-radius: 14px;
    }

    .review p {
      text-align: left;
    }

    .cover-page,
    .back-cover-page {
      padding: 0;
      background: #111827;
      color: #ffffff;
    }

    .cover-img-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(245,210,122,.32), transparent 35%),
        linear-gradient(135deg, #2a1607 0%, #4b270a 42%, #111827 100%);
    }

    .cover-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.05) contrast(1.03);
    }

    .cover-fallback-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 160px;
      opacity: .28;
    }

    .cover-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.74) 0%, rgba(0,0,0,.20) 36%, rgba(0,0,0,.34) 65%, rgba(0,0,0,.84) 100%);
      z-index: 1;
    }

    .cover-content {
      position: relative;
      z-index: 2;
      min-height: 1122px;
      padding: 46px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .cover-top {
      padding-top: 8px;
    }

    .cover-label {
      display: inline-block;
      padding: 9px 18px;
      border: 1px solid rgba(245,210,122,.85);
      background: rgba(0,0,0,.42);
      color: #ffe8a3;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 1.5px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .cover-version {
      margin-top: 14px;
      color: #fff3c4;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .cover-title-area {
      background: rgba(0,0,0,.50);
      border: 1px solid rgba(245,210,122,.50);
      border-radius: 26px;
      padding: 28px;
      box-shadow: 0 25px 70px rgba(0,0,0,.35);
    }

    .cover-title {
      margin: 0;
      color: #fff7d6;
      font-size: 54px;
      line-height: 1.02;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 0 4px 22px rgba(0,0,0,.65);
    }

    .cover-subtitle {
      margin: 18px auto 0;
      max-width: 680px;
      color: #ffffff;
      font-size: 21px;
      line-height: 1.3;
      font-weight: 800;
      text-shadow: 0 3px 16px rgba(0,0,0,.75);
    }

    .cover-footer {
      padding-bottom: 8px;
      color: #fff3c4;
      font-weight: 900;
      font-size: 17px;
      line-height: 1.45;
      text-shadow: 0 3px 14px rgba(0,0,0,.8);
    }

    .back-content {
      position: relative;
      z-index: 2;
      min-height: 1122px;
      padding: 64px 54px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      text-align: center;
    }

    .back-box {
      background: rgba(0,0,0,.54);
      border: 1px solid rgba(245,210,122,.46);
      border-radius: 26px;
      padding: 30px;
    }

    .back-phrase {
      margin: 0 0 18px;
      color: #fff7d6;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 900;
    }

    .back-text {
      margin: 0 0 20px;
      color: #ffffff;
      font-size: 17px;
      line-height: 1.55;
      text-align: center;
    }

    .back-ministry {
      color: #fff3c4;
      font-weight: 900;
      font-size: 16px;
      line-height: 1.5;
    }

    @media (max-width: 1050px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .document-shell {
        max-height: none;
      }

      #printArea {
        transform: scale(.78);
        transform-origin: top left;
        margin: 0;
      }

      .document-shell {
        min-height: 900px;
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 12px;
      }

      .brand-area h1 {
        font-size: 30px;
      }

      .row,
      .btn-row {
        grid-template-columns: 1fr;
      }

      #printArea {
        transform: scale(.52);
      }

      .document-shell {
        min-height: 650px;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .topbar,
      .panel,
      .preview-title {
        display: none !important;
      }

      .app {
        padding: 0;
        max-width: none;
      }

      .layout {
        display: block;
      }

      .preview-panel {
        padding: 0;
        border: 0;
        box-shadow: none;
      }

      .document-shell {
        overflow: visible;
        max-height: none;
        border: 0;
      }

      #printArea {
        transform: none;
        margin: 0;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand-area">
        <h1>VERBO IA</h1>
        <p>Gerador de materiais cristãos — CPID</p>
      </div>

      <div class="top-actions">
        <button class="btn-secondary" onclick="rolarParaPrevia()">Ver prévia</button>
        <button class="btn-secondary" onclick="rolarParaFormulario()">Formulário</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel" id="formulario">
        <h2>Gerar material</h2>

        <div class="form-section">
          <label>Tipo de material</label>
          <select id="materialType">
            <option value="sermao">Sermão</option>
            <option value="devocional">Devocional</option>
            <option value="estudo">Estudo bíblico / teológico</option>
            <option value="ebook">E-book</option>
            <option value="livro">Livro</option>
            <option value="curso">Curso</option>
            <option value="revista" selected>Revista de ensino bíblico</option>
          </select>

          <div class="row">
            <div>
              <label>Versão da revista</label>
              <select id="revistaVersion">
                <option value="professor" selected>Revista do professor</option>
                <option value="aluno">Revista do aluno</option>
              </select>
            </div>

            <div>
              <label>Tradução bíblica padrão</label>
              <input id="bibleVersion" value="King James Fiel 1611" />
            </div>
          </div>

          <label>Título</label>
          <input id="title" value="O Livro que Carregamos" />

          <label>Subtítulo</label>
          <input id="subtitle" value="Conhecendo a Bíblia, sua origem, formação, inspiração, preservação e responsabilidade espiritual" />

          <label>Tema principal / instruções</label>
          <textarea id="theme">Crie uma revista mensal de Escola Bíblica Dominical, versão do professor, para a classe adulta, com 4 lições completas, sobre o tema da Bíblia dentro da área da Bibliologia.

A revista deve ensinar sobre a Bíblia como Palavra de Deus, sua origem divina, sua inspiração, sua autoridade, sua formação, sua preservação e a responsabilidade espiritual da Igreja diante das Escrituras.

A revista deve ter conteúdo profundo, bíblico, doutrinário, pastoral, didático, reverente e fiel ao pentecostalismo clássico.

A capa deve ser gerada com imagem profissional, contendo elementos bíblicos nobres: Bíblia aberta antiga, pergaminhos, rolos das Escrituras, manuscritos bíblicos, luz dourada suave e atmosfera reverente. Não usar folhinhas soltas, bloquinhos, papeizinhos retangulares ou cartões.

Lição 1 — A Bíblia: A Palavra de Deus Escrita aos Homens.
Lição 2 — A Inspiração das Escrituras.
Lição 3 — O Cânon Sagrado e a Formação da Bíblia.
Lição 4 — A Preservação da Bíblia e a Responsabilidade da Igreja.</textarea>

          <label>Texto bíblico base</label>
          <input id="biblicalBase" value="2 Timóteo 3.16-17; 2 Pedro 1.20-21; Salmos 119.105; Isaías 40.8; Mateus 24.35; João 17.17; Hebreus 4.12" />

          <div class="row">
            <div>
              <label>Lições / capítulos</label>
              <input id="quantity" type="number" min="1" max="20" value="4" />
            </div>

            <div>
              <label>Pontos do sermão</label>
              <select id="sermonPoints">
                <option value="3">3 tópicos</option>
                <option value="4" selected>4 tópicos</option>
                <option value="5">5 tópicos</option>
              </select>
            </div>
          </div>

          <label>Público-alvo</label>
          <input id="targetAudience" value="Classe adulta da Escola Bíblica Dominical, professores, líderes, obreiros e alunos adultos" />

          <label>Autor / comentarista</label>
          <input id="author" value="Pr. Isiquel Rodrigues" />

          <label>Editora / ministério</label>
          <input id="ministry" value="CPID - Casa Publicadora da Igreja de Deus" />

          <div class="row">
            <div>
              <label>Profundidade</label>
              <select id="depthLevel">
                <option>Simples</option>
                <option>Intermediário</option>
                <option selected>Muito profundo</option>
              </select>
            </div>

            <div>
              <label>Estilo visual</label>
              <select id="visualStyle">
                <option>Minimalista</option>
                <option selected>Colorido</option>
                <option>Editorial clássico</option>
                <option>Luxo teológico</option>
              </select>
            </div>
          </div>

          <label>Capa</label>
          <select id="coverMode">
            <option value="com-capa" selected>Com capa</option>
            <option value="sem-capa">Sem capa</option>
          </select>

          <label>Tom do material</label>
          <input id="tone" value="Bíblico, doutrinário, pastoral, didático, reverente, pentecostal clássico, apologético, profundo e edificante" />

          <label>Código de acesso</label>
          <input id="adminCode" placeholder="Código para recursos reservados" />

          <div class="btn-area">
            <button class="btn-primary" id="generateBtn" onclick="gerarMaterial()">Gerar material</button>

            <div class="btn-row">
              <button class="btn-edit" id="editBtn" onclick="alternarEdicao()">Editar prévia</button>
              <button class="btn-secondary" onclick="baixarPDF()">Baixar PDF</button>
            </div>

            <button class="btn-danger" onclick="limparResultado()">Limpar</button>
          </div>

          <div id="statusBox" class="status-box">
            <p id="statusText" class="status-main"></p>
            <ul id="progressLog" class="progress-list"></ul>
          </div>
        </div>
      </section>

      <section class="preview-panel" id="previa">
        <div class="preview-title">
          <h2>Prévia</h2>

          <div class="preview-actions">
            <button class="btn-edit" onclick="alternarEdicao()">Editar</button>
            <button class="btn-secondary" onclick="baixarPDF()">Baixar PDF</button>
          </div>
        </div>

        <div class="document-shell">
          <div id="printArea">
            <div class="empty">
              O material gerado aparecerá aqui.
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
    <script>
    let materialAtual = null;
    let modoEdicao = false;

    function rolarParaPrevia() {
      document.getElementById("previa").scrollIntoView({ behavior: "smooth" });
    }

    function rolarParaFormulario() {
      document.getElementById("formulario").scrollIntoView({ behavior: "smooth" });
    }

    function getDados() {
      return {
        materialType: document.getElementById("materialType").value,
        revistaVersion: document.getElementById("revistaVersion").value,
        bibleVersion: document.getElementById("bibleVersion").value,
        title: document.getElementById("title").value,
        subtitle: document.getElementById("subtitle").value,
        theme: document.getElementById("theme").value,
        biblicalBase: document.getElementById("biblicalBase").value,
        quantity: Number(document.getElementById("quantity").value || 4),
        sermonPoints: Number(document.getElementById("sermonPoints").value || 4),
        targetAudience: document.getElementById("targetAudience").value,
        author: document.getElementById("author").value,
        ministry: document.getElementById("ministry").value,
        depthLevel: document.getElementById("depthLevel").value,
        visualStyle: document.getElementById("visualStyle").value,
        coverMode: document.getElementById("coverMode").value,
        tone: document.getElementById("tone").value,
        adminCode: document.getElementById("adminCode").value
      };
    }

    function setStatus(texto, tipo = "") {
      const box = document.getElementById("statusBox");
      const txt = document.getElementById("statusText");

      box.className = "status-box show";
      txt.textContent = texto;

      if (tipo === "erro") {
        box.classList.add("status-error");
      } else if (tipo === "ok") {
        box.classList.add("status-ok");
      }
    }

    function limparProgresso() {
      document.getElementById("progressLog").innerHTML = "";
    }

    function addProgresso(texto, tipo = "") {
      const ul = document.getElementById("progressLog");
      const li = document.createElement("li");
      li.textContent = texto;

      if (tipo === "ok") li.classList.add("done");
      if (tipo === "erro") li.classList.add("error");

      ul.appendChild(li);
    }

    function setLoading(loading) {
      const btn = document.getElementById("generateBtn");
      btn.disabled = loading;
      btn.textContent = loading ? "Gerando..." : "Gerar material";
    }

    async function gerarMaterial() {
      const dados = getDados();

      setLoading(true);
      limparProgresso();
      setStatus("Iniciando geração do material...");

      try {
        if (dados.materialType === "revista") {
          materialAtual = await gerarRevistaPorPartes(dados);
          renderMaterial(materialAtual);
          setStatus("Revista gerada com sucesso.", "ok");
          addProgresso("Revista finalizada e pronta para revisão.", "ok");
          rolarParaPrevia();
          return;
        }

        addProgresso("Gerando material...");
        const resposta = await chamarGerar(dados);

        materialAtual = resposta.material;
        renderMaterial(materialAtual);

        addProgresso("Material gerado com sucesso.", "ok");
        setStatus("Material gerado com sucesso.", "ok");
        rolarParaPrevia();
      } catch (erro) {
        console.error(erro);
        addProgresso(erro.message || "Erro ao gerar material.", "erro");
        setStatus(erro.message || "Erro ao gerar material.", "erro");
      } finally {
        setLoading(false);
      }
    }

    async function chamarGerar(payload) {
      const resposta = await fetch("/api/gerar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await resposta.json().catch(() => null);

      if (!resposta.ok) {
        throw new Error(data?.error || "Erro na geração do material.");
      }

      return data;
    }

    async function chamarCapa(payload) {
      const resposta = await fetch("/api/capa", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await resposta.json().catch(() => null);

      if (!resposta.ok) {
        throw new Error(data?.error || "Erro ao gerar imagem da capa.");
      }

      return data;
    }

    async function gerarRevistaPorPartes(dados) {
      setStatus("Gerando revista por etapas...");
      addProgresso("1/9 - Gerando estrutura da revista...");

      const metaResp = await chamarGerar({
        ...dados,
        revistaPart: "meta"
      });

      const meta = metaResp.material || {};

      addProgresso("1/9 - Estrutura da revista gerada.", "ok");

      const lessonTitles = Array.isArray(meta.lessonTitles) && meta.lessonTitles.length
        ? meta.lessonTitles
        : [
            "Lição 1 - A Bíblia: A Palavra de Deus Escrita aos Homens",
            "Lição 2 - A Inspiração das Escrituras",
            "Lição 3 - O Cânon Sagrado e a Formação da Bíblia",
            "Lição 4 - A Preservação da Bíblia e a Responsabilidade da Igreja"
          ];

      const lessons = [];

      for (let i = 1; i <= 4; i++) {
        setStatus(`Gerando Lição ${i}...`);
        addProgresso(`${i + 1}/9 - Gerando Lição ${i}...`);

        const lessonResp = await chamarGerar({
          ...dados,
          revistaPart: "lesson",
          lessonNumber: i,
          lessonTitles,
          presentationToTeacher: meta.presentationToTeacher || "",
          magazineOverview: meta.magazineOverview || "",
          generalTeacherGuidance: meta.generalTeacherGuidance || "",
          instrucoesExtras: `Esta é a lição ${i} da revista. Mantenha ligação com as demais lições, sem repetir conteúdo desnecessário.`
        });

        lessons.push(lessonResp.material);
        addProgresso(`${i + 1}/9 - Lição ${i} gerada.`, "ok");
      }

      let coverImageUrl = "";
      let backCoverImageUrl = "";

      if (dados.coverMode !== "sem-capa") {
        setStatus("Gerando imagem profissional da capa...");
        addProgresso("6/9 - Gerando imagem profissional da capa...");

        try {
          const capaResp = await chamarCapa({
            ...dados,
            tipoImagem: "front",
            lessonTitles,
            title: meta.title || dados.title,
            subtitle: meta.subtitle || dados.subtitle,
            theme: dados.theme
          });

          coverImageUrl = capaResp.imageDataUrl || "";
          addProgresso("6/9 - Imagem da capa gerada com sucesso.", "ok");
        } catch (erro) {
          console.error("Erro ao gerar capa:", erro);
          addProgresso("6/9 - A imagem da capa falhou. A capa reserva será usada. Motivo: " + (erro.message || "erro desconhecido"), "erro");
        }

        setStatus("Gerando imagem profissional da contracapa...");
        addProgresso("7/9 - Gerando imagem profissional da contracapa...");

        try {
          const contracapaResp = await chamarCapa({
            ...dados,
            tipoImagem: "back",
            lessonTitles,
            title: meta.title || dados.title,
            subtitle: meta.subtitle || dados.subtitle,
            theme: dados.theme
          });

          backCoverImageUrl = contracapaResp.imageDataUrl || "";
          addProgresso("7/9 - Imagem da contracapa gerada com sucesso.", "ok");
        } catch (erro) {
          console.error("Erro ao gerar contracapa:", erro);
          addProgresso("7/9 - A imagem da contracapa falhou. A contracapa reserva será usada. Motivo: " + (erro.message || "erro desconhecido"), "erro");
        }
      } else {
        addProgresso("6/9 - Capa desativada pelo usuário.", "ok");
        addProgresso("7/9 - Contracapa desativada pelo usuário.", "ok");
      }

      let coverData = null;
      let backCoverData = null;

      addProgresso("8/9 - Gerando textos editoriais da capa...");

      try {
        const coverResp = await chamarGerar({
          ...dados,
          revistaPart: "cover",
          lessonTitles
        });

        coverData = coverResp.material;
        addProgresso("8/9 - Textos da capa gerados.", "ok");
      } catch (erro) {
        coverData = criarCapaPadrao(dados);
        addProgresso("8/9 - Texto da capa gerado pelo modo reserva.", "ok");
      }

      addProgresso("9/9 - Gerando textos editoriais da contracapa...");

      try {
        const backResp = await chamarGerar({
          ...dados,
          revistaPart: "backcover",
          lessonTitles
        });

        backCoverData = backResp.material;
        addProgresso("9/9 - Textos da contracapa gerados.", "ok");
      } catch (erro) {
        backCoverData = criarContracapaPadrao(dados);
        addProgresso("9/9 - Texto da contracapa gerado pelo modo reserva.", "ok");
      }

      return {
        type: "revista",
        title: meta.title || dados.title,
        subtitle: meta.subtitle || dados.subtitle,
        author: meta.author || dados.author,
        ministry: meta.ministry || dados.ministry,
        revistaVersion: meta.revistaVersion || dados.revistaVersion,
        presentationToTeacher: meta.presentationToTeacher || "",
        magazineOverview: meta.magazineOverview || "",
        generalTeacherGuidance: meta.generalTeacherGuidance || "",
        monthSummary: meta.monthSummary || "",
        quarterSummary: meta.quarterSummary || "",
        lessonTitles,
        lessons,
        cover: coverData,
        backCover: backCoverData,
        coverImageUrl,
        backCoverImageUrl
      };
    }

    function criarCapaPadrao(dados) {
      return {
        title: dados.title,
        subtitle: dados.subtitle,
        topLabel: "Revista Mensal de Escola Bíblica Dominical",
        versionLabel: dados.revistaVersion === "aluno" ? "Revista do Aluno" : "Revista do Professor",
        author: dados.author,
        ministry: dados.ministry,
        coverPhrase: "Conhecendo e vivendo a Palavra de Deus"
      };
    }

    function criarContracapaPadrao(dados) {
      return {
        title: dados.title,
        subtitle: dados.subtitle,
        ministry: dados.ministry,
        author: dados.author,
        backCoverPhrase: "A Palavra de Deus permanece para sempre.",
        backCoverText: "Uma revista preparada para fortalecer o ensino bíblico, edificar a Igreja e conduzir o professor a uma exposição fiel das Escrituras."
      };
    }

    function escapeHtml(texto) {
      return String(texto || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function p(texto) {
      if (!texto) return "";
      return `<p>${escapeHtml(texto)}</p>`;
    }

    function alternarEdicao() {
      const area = document.getElementById("printArea");

      if (!materialAtual) {
        setStatus("Gere um material antes de editar.", "erro");
        return;
      }

      modoEdicao = !modoEdicao;
      area.contentEditable = modoEdicao ? "true" : "false";
      area.classList.toggle("editing", modoEdicao);

      const botoes = document.querySelectorAll("#editBtn, .preview-actions .btn-edit");
      botoes.forEach((btn) => {
        btn.textContent = modoEdicao ? "Concluir edição" : "Editar prévia";
      });

      setStatus(
        modoEdicao
          ? "Modo edição ativado. Agora você pode clicar no texto da prévia e alterar."
          : "Modo edição concluído. As alterações visuais foram mantidas na prévia.",
        "ok"
      );
    }

    function renderMaterial(m) {
      if (!m) return;

      if (m.type === "revista") {
        renderRevista(m);
        return;
      }

      let html = "";

      html += `
        <section class="page content-page">
          <span class="badge">${escapeHtml(m.type || "Material cristão")}</span>
          <h1>${escapeHtml(m.title || "")}</h1>
          ${m.subtitle ? `<h3>${escapeHtml(m.subtitle)}</h3>` : ""}
          ${m.biblicalBase ? `<div class="quote">${escapeHtml(m.biblicalBase)}</div>` : ""}
          ${p(m.introduction)}
      `;

      if (Array.isArray(m.topics)) {
        m.topics.forEach((t) => {
          html += `
            <h2>${escapeHtml(t.number ? t.number + ". " : "")}${escapeHtml(t.title || "")}</h2>
            ${t.reference ? `<div class="badge">${escapeHtml(t.reference)}</div>` : ""}
            ${p(t.text)}
          `;
        });
      }

      if (Array.isArray(m.chapters)) {
        m.chapters.forEach((c) => {
          html += `
            <h2>Capítulo ${escapeHtml(c.number || "")} - ${escapeHtml(c.title || "")}</h2>
            ${p(c.text)}
          `;
        });
      }

      if (Array.isArray(m.lessons)) {
        m.lessons.forEach((a) => {
          html += `
            <h2>Aula ${escapeHtml(a.number || "")} - ${escapeHtml(a.title || "")}</h2>
            ${p(a.objective)}
            ${p(a.content)}
            ${a.activity ? `<div class="box"><h3>Atividade</h3>${p(a.activity)}</div>` : ""}
          `;
        });
      }

      html += `
          ${m.application ? `<h2>Aplicação</h2>${p(m.application)}` : ""}
          ${m.conclusion ? `<h2>Conclusão</h2>${p(m.conclusion)}` : ""}
          ${m.prayer ? `<h2>Oração</h2>${p(m.prayer)}` : ""}
        </section>
      `;

      atualizarPreview(html);
    }

    function renderRevista(m) {
      let html = "";

      if (document.getElementById("coverMode").value !== "sem-capa") {
        html += capaRevista(m);
      }

      html += `
        <section class="page content-page">
          <span class="badge">Apresentação ao professor</span>
          <h1>${escapeHtml(m.title || "")}</h1>
          ${m.subtitle ? `<h3>${escapeHtml(m.subtitle)}</h3>` : ""}
          <div class="quote">${escapeHtml(m.ministry || "")}<br>${escapeHtml(m.author || "")}</div>

          <h2>Apresentação ao professor</h2>
          ${p(m.presentationToTeacher)}

          <h2>Panorama geral da revista</h2>
          ${p(m.magazineOverview)}

          <h2>Orientações gerais para o professor</h2>
          ${p(m.generalTeacherGuidance)}

          ${m.monthSummary ? `<h2>Resumo do mês</h2>${p(m.monthSummary)}` : ""}
          ${m.quarterSummary ? `<h2>Resumo do trimestre</h2>${p(m.quarterSummary)}` : ""}

          <div class="box">
            <h3>Lições desta revista</h3>
            <ul>
              ${(m.lessonTitles || []).map((t) => `<li>${escapeHtml(t)}</li>`).join("")}
            </ul>
          </div>
        </section>
      `;

      if (Array.isArray(m.lessons)) {
        m.lessons.forEach((lesson) => {
          html += renderLicao(lesson);
        });
      }

      if (document.getElementById("coverMode").value !== "sem-capa") {
        html += contracapaRevista(m);
      }

      atualizarPreview(html);
    }

    function atualizarPreview(html) {
      const area = document.getElementById("printArea");

      area.contentEditable = "false";
      area.classList.remove("editing");
      modoEdicao = false;

      area.innerHTML = html;
    }

    function capaRevista(m) {
      const c = m.cover || {};

      const versionLabel =
        c.versionLabel ||
        (m.revistaVersion === "aluno" ? "Revista do Aluno" : "Revista do Professor");

      const imgHtml = m.coverImageUrl
        ? `<img src="${m.coverImageUrl}" alt="Capa da revista" />`
        : `<div class="cover-fallback-icon">📖</div>`;

      return `
        <section class="page cover-page">
          <div class="cover-img-wrap">
            ${imgHtml}
          </div>

          <div class="cover-overlay"></div>

          <div class="cover-content">
            <div class="cover-top">
              <div class="cover-label">${escapeHtml(c.topLabel || "Revista Mensal de Escola Bíblica Dominical")}</div>
              <div class="cover-version">${escapeHtml(versionLabel)}</div>
            </div>

            <div class="cover-title-area">
              <h1 class="cover-title">${escapeHtml(c.title || m.title || "")}</h1>
              <div class="cover-subtitle">${escapeHtml(c.subtitle || m.subtitle || "")}</div>
            </div>

            <div class="cover-footer">
              ${escapeHtml(c.ministry || m.ministry || "")}<br>
              ${escapeHtml(c.author || m.author || "")}
            </div>
          </div>
        </section>
      `;
    }

    function contracapaRevista(m) {
      const b = m.backCover || {};

      const imgHtml = m.backCoverImageUrl
        ? `<img src="${m.backCoverImageUrl}" alt="Contracapa da revista" />`
        : `<div class="cover-fallback-icon">📖</div>`;

      return `
        <section class="page back-cover-page">
          <div class="cover-img-wrap">
            ${imgHtml}
          </div>

          <div class="cover-overlay"></div>

          <div class="back-content">
            <div class="back-box">
              <div class="back-phrase">${escapeHtml(b.backCoverPhrase || "A Palavra de Deus permanece para sempre.")}</div>
              <p class="back-text">${escapeHtml(b.backCoverText || "Uma revista preparada para fortalecer o ensino bíblico, edificar a Igreja e conduzir o professor a uma exposição fiel das Escrituras.")}</p>
              <div class="back-ministry">
                ${escapeHtml(b.ministry || m.ministry || "")}<br>
                ${escapeHtml(b.author || m.author || "")}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderLicao(lesson) {
      if (!lesson) return "";

      let html = `
        <section class="page content-page">
          <span class="badge">Lição ${escapeHtml(lesson.number || "")}</span>
          <h1>${escapeHtml(lesson.title || "")}</h1>
          ${lesson.subtitle ? `<h3>${escapeHtml(lesson.subtitle)}</h3>` : ""}

          ${lesson.goldenText ? `<div class="quote"><strong>Texto áureo:</strong><br>${escapeHtml(lesson.goldenText)}</div>` : ""}
          ${lesson.practicalTruth ? `<div class="box"><h3>Verdade prática</h3>${p(lesson.practicalTruth)}</div>` : ""}
          ${lesson.bibleReading ? `<h2>Leitura bíblica em classe</h2>${p(lesson.bibleReading)}` : ""}

          ${Array.isArray(lesson.objectives) ? `
            <div class="objectives">
              <h3>Objetivos da lição</h3>
              <ul>
                ${lesson.objectives.map((o) => `<li>${escapeHtml(o)}</li>`).join("")}
              </ul>
            </div>
          ` : ""}

          ${lesson.teacherWord ? `<h2>Palavra ao professor</h2>${p(lesson.teacherWord)}` : ""}
          ${lesson.lessonOverview ? `<h2>Panorama da lição</h2>${p(lesson.lessonOverview)}` : ""}
          ${lesson.introduction ? `<h2>Introdução</h2>${p(lesson.introduction)}` : ""}
      `;

      if (Array.isArray(lesson.topics)) {
        lesson.topics.forEach((topic, index) => {
          html += `
            <h2>${index + 1}. ${escapeHtml(topic.title || "")}</h2>
            ${topic.reference ? `<div class="badge">${escapeHtml(topic.reference)}</div>` : ""}
            ${p(topic.text)}
          `;

          if (Array.isArray(topic.subtopics)) {
            topic.subtopics.forEach((sub, subIndex) => {
              html += `
                <h3>${index + 1}.${subIndex + 1} ${escapeHtml(sub.title || "")}</h3>
                ${sub.reference ? `<div class="badge">${escapeHtml(sub.reference)}</div>` : ""}
                ${p(sub.text)}
              `;
            });
          }
        });
      }

      html += `
          ${lesson.lifeApplication ? `<h2>Aplicação para a vida</h2>${p(lesson.lifeApplication)}` : ""}
          ${lesson.conclusion ? `<h2>Conclusão</h2>${p(lesson.conclusion)}` : ""}

          ${lesson.bibliologicalAid ? `<div class="box"><h3>Auxílio bibliológico ou doutrinário</h3>${p(lesson.bibliologicalAid)}</div>` : ""}
          ${lesson.historicalSupport ? `<div class="box"><h3>Subsídio histórico</h3>${p(lesson.historicalSupport)}</div>` : ""}
          ${lesson.interpretationCare ? `<div class="box"><h3>Atenção, professor: cuidado na interpretação</h3>${p(lesson.interpretationCare)}</div>` : ""}
          ${lesson.doctrinalSupport ? `<div class="box"><h3>Apoio doutrinário</h3>${p(lesson.doctrinalSupport)}</div>` : ""}

          ${Array.isArray(lesson.recommendedDeepening) ? `
            <div class="box">
              <h3>Para aprofundamento</h3>
              <ul>
                ${lesson.recommendedDeepening.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
              </ul>
            </div>
          ` : ""}

          ${lesson.teacherNotes ? `<div class="box"><h3>Orientações para o professor</h3>${p(lesson.teacherNotes)}</div>` : ""}

          ${Array.isArray(lesson.reviewQuestions) ? `
            <div class="review">
              <h3>Revisando o conteúdo</h3>
              ${lesson.reviewQuestions.map((q, i) => `
                <p><strong>${i + 1}. ${escapeHtml(q.question || "")}</strong><br>
                Resposta: ${escapeHtml(q.answer || "")}</p>
              `).join("")}
            </div>
          ` : ""}
        </section>
      `;

      return html;
    }

    function esperarImagens(container) {
      const imagens = Array.from(container.querySelectorAll("img"));

      if (!imagens.length) {
        return Promise.resolve();
      }

      return Promise.all(
        imagens.map((img) => {
          return new Promise((resolve) => {
            if (img.complete) {
              resolve();
              return;
            }

            img.onload = () => resolve();
            img.onerror = () => resolve();

            setTimeout(resolve, 7000);
          });
        })
      );
    }

    async function baixarPDF() {
      const areaOriginal = document.getElementById("printArea");

      if (!materialAtual) {
        setStatus("Gere um material antes de baixar o PDF.", "erro");
        return;
      }

      setStatus("Preparando PDF...");
      addProgresso("Preparando conteúdo para PDF...");

      try {
        if (modoEdicao) {
          alternarEdicao();
        }

        await esperarImagens(areaOriginal);

        const clone = areaOriginal.cloneNode(true);
        clone.id = "printAreaPDF";
        clone.classList.remove("editing");
        clone.contentEditable = "false";

        clone.style.width = "794px";
        clone.style.margin = "0";
        clone.style.background = "#ffffff";
        clone.style.color = "#111827";
        clone.style.transform = "none";
        clone.style.position = "fixed";
        clone.style.left = "-9999px";
        clone.style.top = "0";
        clone.style.zIndex = "-1";

        document.body.appendChild(clone);

        await esperarImagens(clone);
        await new Promise((resolve) => setTimeout(resolve, 600));

        const titulo = (materialAtual.title || "material-cpid")
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");

        const opt = {
          margin: 0,
          filename: `${titulo || "material-cpid"}.pdf`,
          image: {
            type: "jpeg",
            quality: 0.98
          },
          html2canvas: {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            backgroundColor: "#ffffff",
            logging: false,
            scrollX: 0,
            scrollY: 0,
            windowWidth: 794
          },
          jsPDF: {
            unit: "pt",
            format: "a4",
            orientation: "portrait"
          },
          pagebreak: {
            mode: ["css", "legacy"]
          }
        };

        await html2pdf()
          .set(opt)
          .from(clone)
          .save();

        document.body.removeChild(clone);

        addProgresso("PDF baixado com sucesso.", "ok");
        setStatus("PDF baixado com sucesso.", "ok");
      } catch (erro) {
        console.error(erro);
        addProgresso("Erro ao baixar PDF: " + (erro.message || "erro desconhecido"), "erro");
        setStatus(erro.message || "Erro ao baixar PDF.", "erro");
      }
    }

    function limparResultado() {
      materialAtual = null;
      modoEdicao = false;

      const area = document.getElementById("printArea");
      area.contentEditable = "false";
      area.classList.remove("editing");

      area.innerHTML = `
        <div class="empty">
          O material gerado aparecerá aqui.
        </div>
      `;

      limparProgresso();
      setStatus("Prévia limpa.");
    }
  </script>
</body>
</html>
